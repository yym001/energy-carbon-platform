<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunDo Energy Carbon Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-base: #0b1220;
            --bg-surface: #172131;
            --bg-elevated: #253247;
            --bg-content: #111a28;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --accent-green: #22C55E;
            --accent-blue: #3B82F6;
            --accent-cyan: #06B6D4;
            --border: #334155;
            --border-light: #475569;
            --font-ui: 'Fira Sans', sans-serif;
            --nav-right-w: 64px;
            --topbar-h: 60px;
            --ai-panel-w: 360px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background: var(--bg-base);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .topbar {
            height: var(--topbar-h);
            background: #152031;
            border-bottom: 1px solid rgba(71, 85, 105, 0.72);
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: 32px;
        }

        .topbar-brand .logo-placeholder {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: white;
        }

        .topbar-brand .logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .topbar-brand .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .topbar-brand .brand-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .topbar-brand .sys-name {
            font-size: 11px;
            color: var(--text-muted);
        }

        .topbar-menu {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .topbar-menu .module-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--accent-green);
            margin-right: 8px;
        }

        .topbar-menu .sep {
            display: none !important;
        }

        .topbar-menu .sub-menu {
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all .2s;
            border-bottom: 2px solid transparent;
        }

        .topbar-menu .sub-menu:hover {
            color: var(--text-secondary);
        }

        .topbar-menu .sub-menu.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent-green);
            font-weight: 500;
        }

        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            font-size: 12px;
        }

        .lang-toggle span {
            color: var(--text-muted);
            transition: all .2s;
            font-weight: 400;
        }

        .lang-toggle span.active {
            color: var(--text-primary);
            font-weight: 600;
        }

        .lang-toggle .lang-sep {
            color: var(--border-light);
            margin: 0 1px;
            font-weight: 300;
        }

        .topbar-tools {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .topbar-tools .tool-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: color .2s;
        }

        .topbar-tools .tool-item:hover {
            color: var(--text-primary);
        }

        .topbar-tools .user-block {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background .2s;
        }

        .topbar-tools .user-block:hover {
            background: var(--bg-elevated);
        }

        .topbar-tools .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: white;
        }

        .topbar-tools .user-info {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }

        .topbar-tools .user-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .topbar-tools .user-role {
            font-size: 10px;
            color: var(--text-muted);
        }

        .ai-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 32px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid rgba(71, 85, 105, 0.72);
            background: rgba(30, 41, 59, 0.9);
            color: var(--text-primary);
            cursor: pointer;
            transition: all .2s;
            font-size: 12px;
            font-weight: 600;
        }

        .ai-btn:hover, .ai-btn.active {
            border-color: rgba(59, 130, 246, 0.45);
            background: rgba(59, 130, 246, 0.14);
        }

        .cockpit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 32px;
            padding: 0 12px;
            border-radius: 10px;
            border: 1px solid rgba(71, 85, 105, 0.72);
            background: rgba(30, 41, 59, 0.9);
            color: var(--text-primary);
            cursor: pointer;
            transition: all .2s;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
        }

        .cockpit-btn:hover {
            border-color: rgba(34, 197, 94, 0.45);
            background: rgba(34, 197, 94, 0.14);
        }

        .right-nav {
            position: fixed;
            top: var(--topbar-h);
            left: 0;
            width: var(--nav-right-w);
            height: calc(100vh - var(--topbar-h));
            background: #0b1220;
            border-right: 1px solid rgba(51, 65, 85, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
            gap: 4px;
            z-index: 90;
        }

        .right-nav .nav-item {
            width: 48px;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.3;
        }

        .right-nav .nav-item:hover {
            color: var(--text-secondary);
            background: var(--bg-elevated);
        }

        .right-nav .nav-item.active {
            color: var(--accent-green);
            background: rgba(34, 197, 94, .1);
        }

        .right-nav .nav-item .nav-icon {
            width: 20px;
            height: 20px;
        }

        .nav-item-group {
            position: relative;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .nav-flyout {
            position: absolute;
            top: 0;
            left: calc(100% + 8px);
            min-width: 188px;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.14);
            background: linear-gradient(180deg, rgba(17, 25, 37, 0.82), rgba(12, 19, 30, 0.76));
            box-shadow: 0 18px 42px rgba(2, 6, 23, 0.34);
            backdrop-filter: blur(16px) saturate(120%);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all .22s ease;
            z-index: 999;
        }

        .nav-item-group.show-flyout .nav-flyout {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }



        .nav-flyout-title {
            font-size: 9px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: rgba(148, 163, 184, 0.72);
            margin-bottom: 8px;
            padding: 4px 8px 8px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .nav-flyout-item {
            position: relative;
            padding: 10px 12px 10px 16px;
            margin: 4px 0;
            border-radius: 10px;
            color: #c4d0df;
            cursor: pointer;
            transition: all .2s ease;
            font-size: 12px;
            font-weight: 500;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .nav-flyout-item:hover {
            background: rgba(30, 41, 59, 0.54);
            color: var(--text-primary);
        }

        .nav-flyout-item.active {
            background: rgba(34, 197, 94, 0.08);
            color: var(--text-primary);
        }

        .nav-flyout-item.active::before {
            content: "";
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(74, 222, 128, 0.95), rgba(34, 197, 94, 0.72));
        }

        .main-wrap {
            margin-top: var(--topbar-h);
            margin-left: var(--nav-right-w);
            display: flex;
            height: calc(100vh - var(--topbar-h));
            position: relative;
            transition: padding-right .28s ease;
        }

        .main-wrap.ai-open {
            padding-right: var(--ai-panel-w);
        }

        .content-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #0b1220;
            display: block;
        }

        .ai-workspace {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: var(--ai-panel-w);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.96));
            border-left: 1px solid rgba(71, 85, 105, 0.8);
            box-shadow: -20px 0 48px rgba(2, 6, 23, 0.32);
            transform: translateX(var(--ai-panel-w));
            opacity: 0;
            pointer-events: none;
            transition: transform .28s ease, opacity .22s ease;
            z-index: 12;
            display: flex;
            flex-direction: column;
        }

        .main-wrap.ai-open .ai-workspace {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .ai-workspace-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.6);
        }

        .ai-header-title {
            display: flex;
            align-items: center;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .ai-close-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            color: var(--text-muted);
            transition: all .2s;
        }

        .ai-close-btn:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .ai-workspace-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .ai-thread {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .ai-message-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .ai-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .ai-message {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            background: var(--bg-surface);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid rgba(71, 85, 105, 0.4);
        }

        .ai-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(71, 85, 105, 0.6);
            display: flex;
            gap: 12px;
        }

        .ai-input {
            flex: 1;
            border: 1px solid rgba(71, 85, 105, 0.6);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            resize: none;
            font-family: var(--font-ui);
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        .ai-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .ai-send-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .ai-send-btn:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-brand">
            <img class="logo" src="./logo.png" alt="Logo" onerror="this.style.display='none'">
            <div class="brand-text">
                <span class="brand-name" id="brandName">RunDo</span>
                <span class="sys-name" id="sysName">Energy Carbon Center</span>
            </div>
        </div>
        <nav class="topbar-menu" id="topbarMenu">
            <span class="module-name" id="moduleNameDisplay">Dashboard</span>
            <span class="sep" id="topMenuSep">/</span>
            <div id="topMenuContainer" style="display:flex;gap:4px;"></div>
        </nav>
        <div class="topbar-tools">
            <div class="tool-item">
                <i data-lucide="cloud-sun" style="width:14px;height:14px"></i>
                <span id="weatherText">32°C Sunny</span>
            </div>
            <div class="tool-item" id="clock">
                <i data-lucide="clock" style="width:14px;height:14px"></i>
                <span id="clockText">10:30</span>
            </div>
            <div class="lang-toggle" id="langToggle">
                <span class="active" id="langEn">EN</span>
                <span class="lang-sep">/</span>
                <span id="langCn">CN</span>
            </div>
            <div class="ai-btn" id="aiToggleBtn">
                <i data-lucide="sparkles" style="width:13px;height:13px"></i>
                <span>iRun</span>
            </div>
            <a href="https://lukidesign.github.io/rundo-energy-carbon-center/index-standalone.html" target="_blank" class="cockpit-btn" id="cockpitBtn" title="Dashboard">
                <i data-lucide="layout-dashboard" style="width:13px;height:13px"></i>
                <span id="cockpitText"></span>
            </a>
            <div class="user-block">
                <div class="user-info" style="text-align:right;">
                    <span class="user-name" id="userName">Admin</span>
                    <span class="user-role" id="userRole">Energy Manager</span>
                </div>
                <div class="avatar">AD</div>
            </div>
        </div>
    </header>

    <nav class="right-nav" id="rightNav"></nav>

    <div class="main-wrap" id="mainWrap">
        <iframe id="contentFrame" class="content-frame" frameborder="0"></iframe>
        
        <aside class="ai-workspace" id="aiWorkspace">
            <div class="ai-workspace-header">
                <div class="ai-header-title">
                    <i data-lucide="sparkles" style="width:16px;height:16px;margin-right:8px;"></i>
                    <span id="aiTitle">iRun AI Assistant</span>
                </div>
                <button class="ai-close-btn" id="aiCloseBtn">
                    <i data-lucide="x" style="width:16px;height:16px;"></i>
                </button>
            </div>
            <div class="ai-workspace-body">
                <div class="ai-thread" id="aiThread">
                    <div class="ai-message-row">
                        <div class="ai-avatar">
                            <i data-lucide="bot" style="width:16px;height:16px;"></i>
                        </div>
                        <div class="ai-message">
                            <p id="aiGreeting">Hello! I am iRun AI Assistant, how can I help you?</p>
                        </div>
                    </div>
                </div>
                <div class="ai-input-area">
                    <textarea id="aiInput" class="ai-input" placeholder="Type your question..." rows="3"></textarea>
                    <button class="ai-send-btn" id="aiSendBtn">
                        <i data-lucide="send" style="width:16px;height:16px;"></i>
                        <span id="sendBtnText">Send</span>
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <script src="navbar-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
